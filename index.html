<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Opening Payment App...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, system-ui, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .card {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(20px);
      border-radius: 20px;
      padding: 40px 32px;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h2 { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 14px; opacity: 0.85; line-height: 1.6; margin-bottom: 20px; }
    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: #fff;
      color: #764ba2;
      font-weight: 700;
      font-size: 16px;
      text-decoration: none;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      transition: transform 0.2s;
    }
    .btn:active { transform: scale(0.97); }
    .fallback { margin-top: 20px; font-size: 12px; opacity: 0.7; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner" id="spinner"></div>
    <div class="icon" id="icon" style="display:none">💳</div>
    <h2 id="title">Opening UPI App...</h2>
    <p id="msg">Please wait while we redirect you to your payment app.</p>
    <a id="payBtn" class="btn" style="display:none" href="#">Tap to Pay</a>
    <div class="fallback" id="fallback" style="display:none">
      If nothing opens, please open your UPI app manually and scan the QR code from the email.
    </div>
  </div>
  <script>
    (function() {
      // Read the UPI URL from hash fragment (preferred) or query parameter
      var upiUrl = null;
      if (window.location.hash && window.location.hash.length > 1) {
        var hashParams = new URLSearchParams(window.location.hash.substring(1));
        upiUrl = hashParams.get('url');
      }
      if (!upiUrl) {
        var params = new URLSearchParams(window.location.search);
        upiUrl = params.get('url');
      }

      if (!upiUrl) {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('icon').style.display = 'block';
        document.getElementById('title').textContent = 'Invalid Link';
        document.getElementById('msg').textContent = 'No payment information found. Please use the QR code from the email.';
        return;
      }

      // Decode the URL if it was encoded
      try { upiUrl = decodeURIComponent(upiUrl); } catch(e) {}

      // Try to auto-redirect
      window.location.href = upiUrl;

      // After a short delay, show the manual button
      setTimeout(function() {
        document.getElementById('spinner').style.display = 'none';
        document.getElementById('icon').style.display = 'block';
        document.getElementById('icon').textContent = '💳';
        document.getElementById('title').textContent = 'Tap the button below to pay';
        document.getElementById('msg').textContent = 'Your UPI app should open automatically. If it didn\'t, tap the button below.';
        var btn = document.getElementById('payBtn');
        btn.href = upiUrl;
        btn.style.display = 'inline-block';
        document.getElementById('fallback').style.display = 'block';
      }, 1500);
    })();
  </script>
</body>
</html>
